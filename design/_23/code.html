</nav>
<div class="flex items-center gap-base">

</div>
</div>
</header>
<main class="flex-grow w-full max-w-container-max mx-auto px-margin-mobile md:px-gutter py-md">
<div class="max-w-2xl mx-auto space-y-md">
<!-- Hero Title -->

</div>
<!-- Multi-Card Selection Section -->

<div class="flex gap-base">
<div class="relative flex-grow">

<input class="w-full border border-outline-variant rounded-xl py-base pl-10 pr-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all bg-surface-container-lowest outline-none" id="cardSearch" placeholder="타로 카드 이름을 입력하세요 (예: 바보, 마법사)" type="text"/>
</div>
<button class="px-gutter bg-primary text-on-primary rounded-xl font-label-md hover:bg-primary-container transition-colors" id="searchBtn">검색</button>
</div>

</div>

</div>

<!-- Form Fields -->

<label class="font-label-md text-label-md text-on-surface-variant block" for="date">날짜</label>
<div class="relative">
<input class="w-full border border-outline-variant rounded-xl py-base px-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all bg-surface-container-lowest appearance-none outline-none" id="date" name="date" type="date"/>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">calendar_today</span>

<div class="space-y-xs">

</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block">[마법사] 해석</label>
<textarea class="w-full border border-outline-variant rounded-xl py-base px-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all bg-surface-container-lowest resize-none outline-none" placeholder="마법사 카드의 의미를 적어주세요." rows="2"></textarea>

<div class="font-label-sm text-label-sm text-on-surface-variant">© 2024 타로 노트. Reflective Clarity for Mindful Living.</div>
<div class="flex gap-md">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">개인정보처리방침</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">이용약관</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">피드백 보내기</a>
</div>
</div>
</footer>
<script>
    // Set default date to today
    document.getElementById('date').valueAsDate = new Date();

    const selectedCards = new Map(); // Store cardId -> cardName

    function toggleCard(element) {
        const cardId = element.getAttribute('data-card-id');
        const cardName = element.getAttribute('data-card-name');
        const img = element.querySelector('img');
        const checkIcon = element.querySelector('.check-icon');

        if (selectedCards.has(cardId)) {
            // Deselect
            selectedCards.delete(cardId);
            element.classList.remove('tarot-card-selected');
            img.classList.add('grayscale');
            checkIcon.classList.remove('scale-100');
            checkIcon.classList.add('scale-0');
        } else {
            // Select
            selectedCards.set(cardId, cardName);
            element.classList.add('tarot-card-selected');
            img.classList.remove('grayscale');
            checkIcon.classList.add('scale-100');
            checkIcon.classList.remove('scale-0');
        }

        updateSelectionUI();
    }

    function updateSelectionUI() {
        const summary = document.getElementById('selectionSummary');
        const count = selectedCards.size;
        summary.textContent = `${count}장의 카드가 선택되었습니다`;

        const perCardSection = document.getElementById('perCardInterprets');
        const dynamicContainer = document.getElementById('dynamicInterpretFields');
        
        if (count > 0) {
            perCardSection.classList.remove('hidden');
            
            // Sync fields without losing existing input content if possible
            const existingFields = Array.from(dynamicContainer.querySelectorAll('[data-interpret-id]'));
            const existingIds = existingFields.map(f => f.getAttribute('data-interpret-id'));
            
            // Remove unselected
            existingFields.forEach(field => {
                const id = field.getAttribute('data-interpret-id');
                if (!selectedCards.has(id)) {
                    field.remove();
                }
            });

            // Add new selected
            selectedCards.forEach((name, id) => {
                if (!existingIds.includes(id)) {
                    const fieldDiv = document.createElement('div');
                    fieldDiv.className = 'space-y-xs';
                    fieldDiv.setAttribute('data-interpret-id', id);
                    fieldDiv.innerHTML = `
                        <label class="font-label-md text-label-md text-on-surface-variant block">[${name}] 해석</label>
                        <textarea class="w-full border border-outline-variant rounded-xl py-base px-sm focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all bg-surface-container-lowest resize-none outline-none" placeholder="${name} 카드의 의미를 적어주세요." rows="2"></textarea>
                    `;
                    dynamicContainer.appendChild(fieldDiv);
                }
            });
        } else {
            perCardSection.classList.add('hidden');
            dynamicContainer.innerHTML = '';
        }
    }

    // Form Submit Interaction
    document.getElementById('recordForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        if (selectedCards.size === 0) {
            alert('최소 한 장 이상의 카드를 선택해주세요.');
            return;
        }

        const btn = e.target.querySelector('button');
        const originalContent = btn.innerHTML;
        
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 저장 중...';
        btn.disabled = true;

        setTimeout(() => {
            btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> 저장 완료';
            btn.classList.replace('bg-primary-container', 'bg-tertiary');
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.classList.replace('bg-tertiary', 'bg-primary-container');
                btn.disabled = false;
            }, 2000);
        }, 1000);
    });
</script>
