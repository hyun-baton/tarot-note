<script>
        // Set default date to today
        document.getElementById('date').valueAsDate = new Date();

        // Tarot Card Selection Logic
        function selectCard(element) {
            // Remove selection from all cards
            document.querySelectorAll('.flex-shrink-0').forEach(card => {
                card.classList.remove('tarot-card-selected');
                card.querySelector('img').classList.add('grayscale');
                card.querySelector('img').classList.remove('grayscale-0');
            });
            // Add selection to clicked card
            element.classList.add('tarot-card-selected');
            const img = element.querySelector('img');
            img.classList.remove('grayscale');
            img.classList.add('grayscale-0');
        }

        // Form Submit Interaction
        document.getElementById('recordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 저장 중...';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> 저장 완료';
                btn.classList.replace('bg-primary-container', 'bg-tertiary');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-tertiary', 'bg-primary-container');
                    btn.disabled = false;
                }, 2000);
            }, 1000);
        });
    </script>
